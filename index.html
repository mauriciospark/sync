<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNC</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="apple-touch-icon" sizes="57x57" href="/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="/ms-icon-144x144.png">
    <meta name="theme-color" content="#ffffff">
    <link rel="shortcut icon" href="favicon/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="favicon/sync_original.png" alt="" class="logo-img" width="100" height="100">
            </div>
        </header>
        <main class="split-view">
            <!-- Coluna Esquerda: Entrada de Dados -->
            <section class="config-panel">
                <div class="input-section">
                    <div class="input-group">
                        <label>Data Alvo</label>
                        <div class="date-inputs">
                            <input type="number" id="day" placeholder="Dia" min="1" max="31">
                            <input type="number" id="month" placeholder="Mês" min="1" max="12">
                            <input type="number" id="year" placeholder="Ano" min="2026">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Horário</label>
                        <div class="time-inputs">
                            <input type="number" id="inputHours" placeholder="HH" min="0" max="23">
                            <span>:</span>
                            <input type="number" id="inputMinutes" placeholder="MM" min="0" max="59">
                        </div>
                    </div>
                    <button id="startBtn" class="start-btn">Iniciar Contagem</button>
                </div>
            </section>

            <!-- Coluna Direita: Resultado -->
            <section class="display-panel">
                <div class="countdown">
                    <div class="time-unit">
                        <span id="days">00</span>
                        <label>Dias</label>
                    </div>
                    <div class="separator">:</div>
                    <div class="time-unit">
                        <span id="hours">00</span>
                        <label>Horas</label>
                    </div>
                    <div class="separator">:</div>
                    <div class="time-unit">
                        <span id="minutes">00</span>
                        <label>Minutos</label>
                    </div>
                    <div class="separator">:</div>
                    <div class="time-unit">
                        <span id="seconds">00</span>
                        <label>Segundos</label>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p> 2026 Linhagem Spark</p>
        </footer>
    </div>

    <!-- Motor SYNC -->
    <script src="js/script.js"></script>
</body>

</html>
